<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="utf-8">
  <title>KPI Dashboard — Power-Up Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>

<body>
  <script>
    var SITE_URL = 'https://kpimaster.vercel.app';
    var POWERUP_URL = 'https://kpimaster.vercel.app/trello';

    TrelloPowerUp.initialize({

      'board-buttons': function (t) {
        return t.getRestApi().isAuthorized().then(function (isAuth) {
          return [{
            icon: {
              dark:  POWERUP_URL + '/icon.png',
              light: POWERUP_URL + '/icon.png'
            },
            text: 'KPI Master',
            callback: function (t) {
              if (!isAuth) {
                return t.modal({
                  title: 'Ligar ao KPI Master',
                  url:   POWERUP_URL + '/auth.html',
                  height: 420
                });
              }
              return t.modal({
                title: 'KPI Master',
                url:   POWERUP_URL + '/dashboard.html',
                height: 620,
                fullscreen: false
              });
            }
          }];
        });
      },

      'authorization-status': function (t) {
        return t.getRestApi().isAuthorized().then(function (isAuth) {
          return { authorized: isAuth };
        });
      },

      'show-authorization': function (t) {
        return t.modal({
          title: 'Ligar ao KPI Master',
          url:   POWERUP_URL + '/auth.html',
          height: 420
        });
      },

      'show-settings': function (t) {
        return t.modal({
          title: 'Definições — KPI Master',
          url:   POWERUP_URL + '/settings.html',
          height: 420
        });
      }

    }, {
      appName: 'KPI Master',
      appKey:  '2506cfe6cf90e4290792e5bec8ace956'
    });
  </script>
</body>

</html>
