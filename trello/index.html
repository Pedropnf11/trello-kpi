<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="utf-8">
  <title>KPI Master — Power-Up</title>
  <!-- Forçar HTTPS e sem cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>

<body>
  <script type="module">
    var POWERUP_URL = 'https://kpismaster.vercel.app/trello';
    var SITE_URL    = 'https://kpismaster.vercel.app';

    TrelloPowerUp.initialize({

      // ── Botão na barra do board ───────────────────────────────────────────
      'board-buttons': function(t) {
        return [{
          icon: {
            dark:  POWERUP_URL + '/icon.png',
            light: POWERUP_URL + '/icon.png'
          },
          text: 'KPI Master',
          callback: function(t) {
            return t.getRestApi().isAuthorized().then(function(isAuth) {
              if (!isAuth) {
                return t.modal({
                  title:  'Ligar ao KPI Master',
                  url:    POWERUP_URL + '/auth.html',
                  height: 420
                });
              }
              return t.modal({
                title:      'KPI Master',
                url:        POWERUP_URL + '/dashboard.html',
                height:     620,
                fullscreen: false
              });
            });
          }
        }];
      },

      // ── Estado de autenticação ────────────────────────────────────────────
      'authorization-status': function(t) {
        return t.getRestApi().isAuthorized().then(function(isAuth) {
          return { authorized: isAuth };
        });
      },

      // ── Ecrã de login ─────────────────────────────────────────────────────
      'show-authorization': function(t) {
        return t.modal({
          title:  'Ligar ao KPI Master',
          url:    POWERUP_URL + '/auth.html',
          height: 420
        });
      },

      // ── Ecrã de settings ─────────────────────────────────────────────────
      'show-settings': function(t) {
        return t.modal({
          title:  'Definições — KPI Master',
          url:    POWERUP_URL + '/settings.html',
          height: 420
        });
      },

      // ── Emblemas nos cartões (Card Badges) ──────────────────────────────────
      'card-badges': function(t) {
        return t.card('id')
          .then(function(card) {
            if (!card || !card.id) return [];
            
            // O ID do Trello contém a data de criação nos primeiros 8 caracteres em hexadecimal
            var timestamp = parseInt(card.id.substring(0, 8), 16);
            var dateCreated = new Date(timestamp * 1000);
            var diffMs = Date.now() - dateCreated.getTime();
            var diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            var text = '';
            var color = 'light-gray';
            
            var isPt = (t.locale || 'en').startsWith('pt');
            
            if (diffDays === 0) {
              text = isPt ? 'Criado hoje' : 'Created today';
              color = 'green';
            } else if (diffDays === 1) {
              text = isPt ? '1 dia' : '1 day old';
            } else {
              text = isPt ? diffDays + ' dias' : diffDays + ' days old';
              if (diffDays > 14) {
                color = 'yellow';
              }
              if (diffDays > 30) {
                color = 'red';
              }
            }
            
            return [{
              text: '🕒 ' + text,
              color: color
            }];
          });
      },

      // ── Emblemas de Detalhes no Verso (Card Detail Badges) ──────────────────
      'card-detail-badges': function(t) {
        return t.card('id')
          .then(function(card) {
            if (!card || !card.id) return [];
            
            var timestamp = parseInt(card.id.substring(0, 8), 16);
            var dateCreated = new Date(timestamp * 1000);
            var diffMs = Date.now() - dateCreated.getTime();
            var diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            var isPt = (t.locale || 'en').startsWith('pt');
            var text = '';
            if (diffDays === 0) {
              text = isPt ? 'Hoje' : 'Today';
            } else if (diffDays === 1) {
              text = isPt ? '1 dia' : '1 day';
            } else {
              text = isPt ? diffDays + ' dias' : diffDays + ' days';
            }
            
            return [{
              title: isPt ? 'Idade do Cartão' : 'Card Age',
              text: text,
              color: 'light-gray'
            }];
          });
      },

      // ── Secção do Verso do Cartão (Card Back Section) ──────────────────────
      'card-back-section': function(t) {
        return {
          title: 'KPI Master History',
          icon: POWERUP_URL + '/icon.png',
          content: {
            type: 'iframe',
            url: t.signUrl(POWERUP_URL + '/card-back.html'),
            height: 72
          }
        };
      }

    }, {
      appName: 'KPI Master',
      appKey:  import.meta.env.VITE_TRELLO_API_KEY
    });
  </script>
</body>

</html>
