<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ligar ao KPI Master</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>

  <div class="auth-container">
    <img src="./icon.png" alt="KPI Master" width="72" height="72"
         onerror="this.style.display='none'">
    <h1>KPI Master</h1>
    <p>Analisa os KPIs do teu board Trello em tempo real — taxa de conclusão, membros ativos, cards por semana e muito mais.</p>
    <div style="width:100%; max-width:280px; display:flex; flex-direction:column; gap:10px; margin-top:8px;">
      <button id="btn-auth" class="btn btn-primary">🔗 Autorizar Acesso</button>
      <p style="font-size:11px; color:#97a0af; text-align:center;">Só são lidos dados do board. Nada é alterado.</p>
    </div>
    <a href="https://kpismaster.vercel.app" target="_blank" class="link">Saber mais sobre o KPI Master →</a>
  </div>

  <div id="auth-error" class="error-msg" style="display:none; margin-top:12px;">
    Erro na autenticação. Tenta novamente.
  </div>

  <script type="module">
    // ⚠️ appKey e appName são OBRIGATÓRIOS em todos os iframes
    var t = TrelloPowerUp.iframe({
      appKey:  import.meta.env.VITE_TRELLO_API_KEY,
      appName: 'KPI Master'
    });

    document.getElementById('btn-auth').addEventListener('click', function() {
      var btn = this;
      btn.disabled = true;
      btn.textContent = 'A autorizar...';

      t.getRestApi().authorize({
        scope:      'read',
        expiration: 'never'
      }).then(function() {
        t.closeModal();
      }).catch(function(err) {
        console.error('Auth error:', err);
        btn.disabled = false;
        btn.textContent = '🔗 Autorizar Acesso';
        document.getElementById('auth-error').style.display = 'block';
      });
    });
  </script>

</body>
</html>
