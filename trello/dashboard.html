<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KPI Master</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>

  <!-- Loading state inicial -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <span>A carregar os teus KPIs...</span>
  </div>

  <!-- Conteúdo principal (escondido até carregar) -->
  <div id="content" style="display:none">

    <!-- KPI Grid -->
    <div class="kpi-grid" id="kpi-grid">
      <!-- Preenchido via JS -->
    </div>

    <!-- Progress de conclusão -->
    <div style="margin-bottom:14px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
        <span style="font-size:12px; font-weight:600; color:#5e6c84;">TAXA DE CONCLUSÃO</span>
        <span id="completion-pct" style="font-size:12px; font-weight:700; color:#0052cc;">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="completion-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- Board name -->
    <div style="font-size:12px; color:#5e6c84; margin-bottom:14px;">
      📋 Board: <strong id="board-name">—</strong>
    </div>

    <!-- Banner upgrade para o site -->
    <div class="upgrade-banner">
      <p>Gráficos avançados, export PDF, webhooks e muito mais</p>
      <a id="full-dashboard-link" href="#" target="_blank" class="btn btn-primary">
        Ver Dashboard Completo →
      </a>
    </div>

  </div>

  <!-- Erro -->
  <div id="error-state" style="display:none">
    <div class="error-msg" id="error-msg">Ocorreu um erro a carregar os dados.</div>
    <br>
    <button class="btn btn-secondary" onclick="loadData()">Tentar novamente</button>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();
    var SITE_URL = 'https://kpimaster.vercel.app';

    function showLoading() {
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('content').style.display = 'none';
      document.getElementById('error-state').style.display = 'none';
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'none';
      document.getElementById('error-state').style.display = 'block';
      document.getElementById('error-msg').textContent = msg || 'Erro desconhecido.';
    }

    function showContent() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('error-state').style.display = 'none';
    }

    function renderKPIs(totalCards, doneCards, members, weekCards, boardId, boardName) {
      var completionRate = totalCards > 0 ? Math.round((doneCards / totalCards) * 100) : 0;

      // KPI grid
      document.getElementById('kpi-grid').innerHTML =
        kpiCard(totalCards, 'Total Cards') +
        kpiCard(doneCards, 'Concluídos') +
        kpiCard(members, 'Membros') +
        kpiCard(weekCards, 'Esta Semana') +
        kpiCard(completionRate + '%', 'Conclusão') +
        kpiCard(totalCards - doneCards, 'Em Aberto');

      // Progress bar
      document.getElementById('completion-pct').textContent = completionRate + '%';
      document.getElementById('completion-bar').style.width = completionRate + '%';

      // Board name
      document.getElementById('board-name').textContent = boardName || boardId;

      // Link para o site completo (passa o boardId para não ter de selecionar)
      document.getElementById('full-dashboard-link').href = SITE_URL + '?board=' + boardId;

      showContent();
    }

    function kpiCard(value, label) {
      return '<div class="kpi-card">' +
        '<span class="kpi-value">' + value + '</span>' +
        '<span class="kpi-label">' + label + '</span>' +
        '</div>';
    }

    function loadData() {
      showLoading();

      // Ir buscar token e dados do board via SDK do Trello
      Promise.all([
        t.getRestApi().getToken(),
        t.board('id', 'name', 'members', 'lists', 'cards')
      ]).then(function(results) {
        var token   = results[0];
        var board   = results[1];
        var cards   = board.cards   || [];
        var lists   = board.lists   || [];
        var members = board.members || [];

        // Calcular KPIs básicos
        var totalCards = cards.length;

        // Cards em listas que contêm "done", "concluído", "fechado", "ganho", "won" no nome
        var doneKeywords = ['done', 'concluído', 'concluido', 'fechado', 'ganho', 'won', 'closed'];
        var doneLists = lists.filter(function(l) {
          var lname = l.name.toLowerCase();
          return doneKeywords.some(function(kw) { return lname.includes(kw); });
        }).map(function(l) { return l.id; });

        var doneCards = cards.filter(function(c) {
          return doneLists.includes(c.idList);
        }).length;

        // Cards criados esta semana
        var oneWeekAgo = new Date();
        oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
        var weekCards = cards.filter(function(c) {
          return c.dateLastActivity && new Date(c.dateLastActivity) > oneWeekAgo;
        }).length;

        renderKPIs(totalCards, doneCards, members.length, weekCards, board.id, board.name);

      }).catch(function(err) {
        console.error('KPI Dashboard error:', err);
        showError('Não foi possível carregar os dados do board. Verifica as permissões.');
      });
    }

    // Iniciar quando o iframe estiver pronto
    t.render(function() {
      loadData();
    });
  </script>

</body>
</html>
