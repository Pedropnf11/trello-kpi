<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KPI Master</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f5f7;
      color: #172b4d;
      box-sizing: border-box;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid #dfe1e6;
    }
    
    .header img {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }
    
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      color: #172b4d;
    }

    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
    }

    /* Retângulos Grandes de Estatísticas */
    .kpi-card {
      background: white;
      border-radius: 8px;
      border: 1px solid #dfe1e6;
      padding: 16px;
      box-shadow: 0 1px 3px rgba(9, 30, 66, 0.08);
      display: flex;
      flex-direction: column;
    }
    
    .kpi-card.fastest {
      border-left: 5px solid #00875a;
    }
    
    .kpi-card.slowest {
      border-left: 5px solid #de350b;
    }

    .kpi-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .kpi-label.fastest {
      color: #00875a;
    }
    
    .kpi-label.slowest {
      color: #de350b;
    }

    .kpi-value {
      font-size: 26px;
      font-weight: 700;
      color: #172b4d;
      margin: 6px 0;
    }

    .kpi-desc {
      font-size: 12px;
      color: #5e6c84;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .footer {
      padding-top: 12px;
      border-top: 1px solid #dfe1e6;
    }

    .btn-primary {
      background: #0052cc;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      box-sizing: border-box;
      transition: background 0.15s ease;
    }
    
    .btn-primary:hover {
      background: #0073e6;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <img src="./icon.png" alt="KPI Master" onerror="this.style.display='none'">
      <h1 id="lbl-header-title">KPI Master</h1>
    </div>

    <!-- Área de Conteúdo Central (Os Retângulos Grandes) -->
    <div class="content-area">
      
      <!-- Estado 1: Não Autorizado -->
      <div id="stats-unauth" class="kpi-card" style="display: none; text-align: center; padding: 24px; gap: 8px;">
        <span style="font-size: 28px;">🔒</span>
        <p style="font-size: 13px; color: #5e6c84; margin: 0 0 8px 0;" id="lbl-stats-auth-desc">Connect account to see Leads Speed here.</p>
        <button id="btn-stats-auth" class="btn-primary" style="padding: 8px 16px; width: auto; display: inline-block; margin: 0 auto;">🔗 Connect Account</button>
      </div>

      <!-- Estado 2: Sem Dados (Lista sem saídas) -->
      <div id="stats-empty" class="kpi-card" style="display: none; text-align: center; padding: 24px; gap: 8px;">
        <span style="font-size: 28px;">📈</span>
        <p style="font-size: 13px; color: #5e6c84; margin: 0;" id="lbl-stats-empty-desc">Move cards out of your first list to see speed statistics.</p>
      </div>

      <!-- Estado 3: Dados Autorizados e Prontos (Dois Retângulos Grandes) -->
      <div id="stats-data" style="display: flex; flex-direction: column; gap: 12px;">
        <!-- Retângulo Rápido -->
        <div class="kpi-card fastest">
          <span class="kpi-label fastest" id="lbl-fastest-title">⚡ Fastest Lead to Leave</span>
          <div class="kpi-value" id="val-fastest-time">—</div>
          <div class="kpi-desc" id="val-fastest-name">—</div>
        </div>

        <!-- Retângulo Lento -->
        <div class="kpi-card slowest">
          <span class="kpi-label slowest" id="lbl-slowest-title">🐢 Slowest Lead to Leave</span>
          <div class="kpi-value" id="val-slowest-time">—</div>
          <div class="kpi-desc" id="val-slowest-name">—</div>
        </div>
      </div>

    </div>

    <!-- Footer (Retângulo Pequeno no fundo para abrir a dashboard principal) -->
    <div class="footer">
      <a id="btn-open" class="btn-primary" href="https://kpismaster.vercel.app" target="_blank">🚀 Open Full Dashboard</a>
    </div>
  </div>

  <script type="module">
    var KEY = import.meta.env.VITE_TRELLO_API_KEY;
    var NAME = 'KPI Master';
    var SITE = 'https://kpismaster.vercel.app';

    var t = TrelloPowerUp.iframe({ appKey: KEY, appName: NAME });

    var locale = t.locale || 'en';
    var isPt = locale.startsWith('pt');

    var translations = {
      pt: {
        btnOpen: '🚀 Abrir Dashboard Completo',
        lblFastestTitle: '⚡ Lead Mais Rápido a Sair',
        lblSlowestTitle: '🐢 Lead Mais Lento a Sair',
        lblStatsAuthDesc: 'Liga a tua conta Trello para veres a velocidade das leads aqui.',
        btnStatsAuth: '🔗 Ligar Conta',
        lblStatsEmptyDesc: 'Move cartões para fora da primeira lista para veres estatísticas de velocidade das leads.'
      },
      en: {
        btnOpen: '🚀 Open Full Dashboard',
        lblFastestTitle: '⚡ Fastest Lead to Leave',
        lblSlowestTitle: '🐢 Slowest Lead to Leave',
        lblStatsAuthDesc: 'Connect your Trello account to see Leads Speed metrics here.',
        btnStatsAuth: '🔗 Connect Account',
        lblStatsEmptyDesc: 'Move cards out of your first list to see speed statistics.'
      }
    };

    var tDict = isPt ? translations.pt : translations.en;

    // Aplicar Traduções Iniciais
    document.getElementById('btn-open').textContent = tDict.btnOpen;
    document.getElementById('lbl-fastest-title').textContent = tDict.lblFastestTitle;
    document.getElementById('lbl-slowest-title').textContent = tDict.lblSlowestTitle;
    document.getElementById('lbl-stats-auth-desc').textContent = tDict.lblStatsAuthDesc;
    document.getElementById('btn-stats-auth').textContent = tDict.btnStatsAuth;
    document.getElementById('lbl-stats-empty-desc').textContent = tDict.lblStatsEmptyDesc;

    t.render(function () {
      t.sizeTo(document.body).catch(function () { });
      
      t.board('id').then(function (board) {
        if (!board || !board.id) {
          document.getElementById('btn-open').href = SITE;
          return;
        }
        document.getElementById('btn-open').href = SITE + '#board=' + board.id;

        checkAuthAndLoadStats(board.id);
      }).catch(function () {
        document.getElementById('btn-open').href = SITE;
      });
    });

    function checkAuthAndLoadStats(boardId) {
      t.getRestApi().isAuthorized().then(function(isAuth) {
        if (isAuth) {
          t.getRestApi().getToken().then(function(token) {
            if (token) {
              document.getElementById('stats-unauth').style.display = 'none';
              loadLeadStats(boardId, token);
            } else {
              showUnauth();
            }
          });
        } else {
          showUnauth();
        }
      });
    }

    function showUnauth() {
      document.getElementById('stats-data').style.display = 'none';
      document.getElementById('stats-empty').style.display = 'none';
      document.getElementById('stats-unauth').style.display = 'block';
      t.sizeTo(document.body).catch(function () { });
    }

    document.getElementById('btn-stats-auth').addEventListener('click', function() {
      t.getRestApi().authorize({ scope: 'read', expiration: 'never' })
        .then(function() {
          t.board('id').then(function(board) {
            if (board && board.id) {
              checkAuthAndLoadStats(board.id);
            }
          });
        });
    });

    function loadLeadStats(boardId, token) {
      // 1. Obter listas do quadro (a primeira lista é a de leads por defeito)
      fetch('https://api.trello.com/1/boards/' + boardId + '/lists?key=' + KEY + '&token=' + token)
        .then(function(r) { 
          if (r.status === 401) {
            t.getRestApi().clearToken();
            showUnauth();
            return;
          }
          return r.json(); 
        })
        .then(function(lists) {
          if (!lists || lists.length === 0) return;
          var leadListId = lists[0].id;
          var leadListName = lists[0].name;

          // Atualizar o título do cabeçalho com o nome da lista onde as leads chegam
          document.getElementById('lbl-header-title').textContent = 'KPI Master (' + leadListName + ')';

          // 2. Obter cartas do quadro com o respetivo histórico de ações
          fetch('https://api.trello.com/1/boards/' + boardId + '/cards?actions=updateCard,createCard&key=' + KEY + '&token=' + token)
            .then(function(r) {
              if (r.status === 401) {
                t.getRestApi().clearToken();
                showUnauth();
                return;
              }
              return r.json();
            })
            .then(function(cards) {
              calculateLeadTimes(cards, leadListId);
            })
            .catch(function(err) { console.error('Erro ao ler cartas:', err); });
        })
        .catch(function(err) { console.error('Erro ao ler listas:', err); });
    }

    function calculateLeadTimes(cards, leadListId) {
      var durations = [];

      cards.forEach(function(card) {
        var actions = card.actions || [];
        actions.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });

        var cardId = card.id;
        var dateCreated = new Date(parseInt(cardId.substring(0, 8), 16) * 1000);

        var firstMove = actions.find(function(act) {
          return act.type === 'updateCard' && act.data && act.data.listBefore;
        });

        if (!firstMove) return;

        var entryDate = null;
        if (firstMove.data.listBefore.id === leadListId) {
          entryDate = dateCreated;
        }

        var currentEntry = entryDate;
        actions.forEach(function(act) {
          if (act.type === 'updateCard' && act.data) {
            if (act.data.listBefore && act.data.listBefore.id === leadListId && currentEntry) {
              var exitDate = new Date(act.date);
              var hours = (exitDate - currentEntry) / (1000 * 60 * 60);
              if (hours > 0) {
                durations.push({
                  cardName: card.name,
                  hours: hours
                });
              }
              currentEntry = null;
            }
            if (act.data.listAfter && act.data.listAfter.id === leadListId) {
              currentEntry = new Date(act.date);
            }
          }
        });
      });

      if (durations.length === 0) {
        // Mostrar ecrã de aviso caso não haja dados
        document.getElementById('stats-data').style.display = 'none';
        document.getElementById('stats-unauth').style.display = 'none';
        document.getElementById('stats-empty').style.display = 'block';
        t.sizeTo(document.body).catch(function () { });
        return;
      }

      durations.sort(function(a, b) { return a.hours - b.hours; });

      var fastest = durations[0];
      var slowest = durations[durations.length - 1];

      function formatDuration(hours) {
        if (hours < 1) {
          var mins = Math.round(hours * 60);
          return isPt ? mins + ' min' : mins + ' mins';
        }
        if (hours < 24) {
          var h = Math.round(hours);
          return isPt ? h + 'h' : h + ' hrs';
        }
        var days = Math.round(hours / 24);
        return isPt ? days + ' dias' : days + ' days';
      }

      // Preencher dados rápidos
      document.getElementById('val-fastest-time').textContent = formatDuration(fastest.hours);
      document.getElementById('val-fastest-name').textContent = fastest.cardName;

      // Preencher dados lentos
      document.getElementById('val-slowest-time').textContent = formatDuration(slowest.hours);
      document.getElementById('val-slowest-name').textContent = slowest.cardName;

      // Exibir secção de dados e esconder outros
      document.getElementById('stats-unauth').style.display = 'none';
      document.getElementById('stats-empty').style.display = 'none';
      document.getElementById('stats-data').style.display = 'flex';
      
      t.sizeTo(document.body).catch(function () { });
    }
  </script>

</body>
</html>
