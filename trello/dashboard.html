<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KPI Master</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      box-sizing: border-box;
    }
    .container {
      text-align: center;
      padding: 24px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(9, 30, 66, 0.15);
      max-width: 320px;
      width: 100%;
    }
    img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #172b4d;
      margin: 0 0 8px 0;
    }
    p {
      font-size: 13px;
      color: #5e6c84;
      margin: 0 0 20px 0;
      line-height: 1.5;
    }
    .btn-primary {
      background: #0052cc;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
      transition: background 0.15s ease;
    }
    .btn-primary:hover {
      background: #007ah8;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="./icon.png" alt="KPI Master" onerror="this.style.display='none'">
    <h1 id="title">KPI Master</h1>
    <p id="desc">Open the KPI Master dashboard to view metrics, charts, and team performance reports for this board.</p>
    <button id="btn-open" class="btn-primary">🚀 Open KPI Master</button>
  </div>

  <script type="module">
    var KEY = import.meta.env.VITE_TRELLO_API_KEY;
    var NAME = 'KPI Master';
    var SITE = 'https://kpismaster.vercel.app';

    var t = TrelloPowerUp.iframe({ appKey: KEY, appName: NAME });

    var locale = t.locale || 'en';
    var isPt = locale.startsWith('pt');

    var translations = {
      pt: {
        desc: 'Abre o dashboard do KPI Master para veres métricas, gráficos e relatórios de performance deste quadro.',
        btnOpen: '🚀 Abrir KPI Master'
      },
      en: {
        desc: 'Open the KPI Master dashboard to view metrics, charts, and team performance reports for this board.',
        btnOpen: '🚀 Open KPI Master'
      }
    };

    var tDict = isPt ? translations.pt : translations.en;

    document.getElementById('desc').textContent = tDict.desc;
    document.getElementById('btn-open').textContent = tDict.btnOpen;

    t.render(function () {
      t.sizeTo(document.body).catch(function () { });
    });

    document.getElementById('btn-open').addEventListener('click', function () {
      t.board('id').then(function (board) {
        var boardId = board ? board.id : '';
        var url = SITE + (boardId ? '#board=' + boardId : '');
        t.showNewTab(url);
      }).catch(function () {
        t.showNewTab(SITE);
      });
    });
  </script>

</body>
</html>
