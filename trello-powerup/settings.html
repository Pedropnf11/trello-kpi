<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Definições — KPI Dashboard</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>

  <div class="settings-container">

    <h2>⚙️ Definições</h2>

    <!-- Estado da conta -->
    <div class="settings-row">
      <span class="settings-label">Estado da conta</span>
      <span id="auth-status-badge">
        <span class="status-warn">A verificar...</span>
      </span>
    </div>

    <!-- Botão desligar (só aparece se estiver autenticado) -->
    <div id="btn-disconnect-wrapper" style="display:none">
      <button id="btn-disconnect" class="btn btn-danger">
        🔌 Desligar Conta
      </button>
    </div>

    <!-- Botão ligar (só aparece se NÃO estiver autenticado) -->
    <div id="btn-connect-wrapper" style="display:none">
      <button id="btn-connect" class="btn btn-primary">
        🔗 Ligar Conta
      </button>
    </div>

    <hr>

    <!-- Link para o site completo -->
    <div style="text-align:center; padding: 4px 0;">
      <a href="https://trello-kpi.vercel.app" target="_blank" class="btn btn-outline">
        🚀 Abrir Dashboard Completo
      </a>
    </div>

    <hr>

    <!-- Info & suporte -->
    <div style="display:flex; flex-direction:column; gap:6px;">
      <a href="https://trello-kpi.vercel.app/privacy" target="_blank" class="link">
        🔒 Política de Privacidade
      </a>
      <a href="https://trello-kpi.vercel.app" target="_blank" class="link">
        📖 Documentação & Suporte
      </a>
    </div>

    <!-- Versão -->
    <div style="font-size:11px; color:#97a0af; text-align:center; padding-top:4px;">
      KPI Dashboard v1.0 · Trello Power-Up
    </div>

  </div>

  <script>
    var t = TrelloPowerUp.iframe();

    t.render(function() {
      t.getRestApi().isAuthorized().then(function(isAuth) {
        var badge           = document.getElementById('auth-status-badge');
        var disconnectWrap  = document.getElementById('btn-disconnect-wrapper');
        var connectWrap     = document.getElementById('btn-connect-wrapper');

        if (isAuth) {
          badge.innerHTML = '<span class="status-ok">✅ Conta ligada</span>';
          disconnectWrap.style.display = 'block';
          connectWrap.style.display    = 'none';
        } else {
          badge.innerHTML = '<span class="status-warn">⚠️ Conta não ligada</span>';
          disconnectWrap.style.display = 'none';
          connectWrap.style.display    = 'block';
        }
      });
    });

    // Desligar conta
    document.getElementById('btn-disconnect').addEventListener('click', function() {
      var btn = this;
      btn.disabled = true;
      btn.textContent = 'A desligar...';

      t.getRestApi().clearToken().then(function() {
        t.closeModal();
      }).catch(function() {
        btn.disabled = false;
        btn.textContent = '🔌 Desligar Conta';
      });
    });

    // Ligar conta
    document.getElementById('btn-connect').addEventListener('click', function() {
      t.getRestApi().authorize({
        scope:      'read',
        expiration: 'never'
      }).then(function() {
        t.closeModal();
      });
    });
  </script>

</body>
</html>
